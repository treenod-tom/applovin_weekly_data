name: AppLovin Data Extraction
on:
  schedule:
    ##- cron: '0 1 * * 3'  # ✅ 매주 수요일 오전 10시 (한국시간)
    - cron: '0 23 * * 2'  # 매주 수요일 오전 8시 (한국시간)
  workflow_dispatch:  # 수동 실행 가능
jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy openpyxl
    
    - name: Run AppLovin extraction
      env:
        APPLOVIN_API_KEY: ${{ secrets.APPLOVIN_API_KEY }}
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        TO_EMAIL: ${{ secrets.TO_EMAIL }}
        CC_EMAIL: ${{ secrets.CC_EMAIL }}
      run: python main.py
